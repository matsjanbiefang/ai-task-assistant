name: iOS Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # "Xcode_16.app" turned out to resolve to Xcode 16.0 specifically, which lacks the
      # "iPhone 16" device type on this runner (confirmed via a diagnostic run — see git history
      # if this needs revisiting). Xcode_16.4.app is confirmed present and has broader simulator
      # coverage per the runner-images docs.
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      # Pick whatever iPhone simulator actually exists at runtime instead of hardcoding a device
      # name/OS pair that can silently stop existing when the runner image changes.
      - name: Find an available iPhone simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | jq -r '.devices | to_entries[] | .value[] | select(.name | test("iPhone")) | .udid' \
            | head -1)
          if [ -z "$UDID" ]; then
            echo "No available iPhone simulator found:" >&2
            xcrun simctl list devices available >&2
            exit 1
          fi
          echo "Using simulator $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build (simulator)
        run: |
          set -o pipefail
          xcodebuild build \
            -project AiTaskAssistant.xcodeproj \
            -scheme AiTaskAssistant \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | (command -v xcpretty >/dev/null && xcpretty || cat)

      - name: Run tests (simulator)
        id: run_tests
        continue-on-error: true
        run: |
          set -o pipefail
          xcodebuild test \
            -project AiTaskAssistant.xcodeproj \
            -scheme AiTaskAssistant \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee test-output.log

      # Milestone 0's exit criterion (prd-update-01.md §10) lives in this printed block —
      # surface it directly in the job log instead of relying on the (possibly truncated)
      # raw xcodebuild output. Also pull out individual per-line failures (from the
      # `corpusCase(_:)` parameterized test) so iterating on the rules doesn't require digging
      # through the full multi-thousand-line xcodebuild log by hand.
      - name: Show extraction accuracy report
        if: always()
        run: |
          echo "--- Accuracy summary ---"
          grep -A 20 "Extraction accuracy" test-output.log || echo "No accuracy report found in test-output.log — did the corpus test even run?"
          echo ""
          echo "--- Individual case failures ---"
          grep -B1 "Expectation failed" test-output.log || echo "No individual case failures found."

      - name: Upload full test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-log
          path: test-output.log

      - name: Fail job if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1

  # Milestone 9 (swipe-final-architecture.md §5): additive, non-blocking — verifies
  # FoundationModelsFallback.swift actually compiles against a real iOS 26 SDK (the `build` job
  # above uses Xcode 16.4, where FoundationModels doesn't exist in the SDK at all, so
  # `#if canImport(FoundationModels)` there just excludes that code — zero signal on whether the
  # guarded code itself is correct). continue-on-error: true because this is a bonus verification
  # signal for code that isn't wired into the shipping app's control flow yet, not a release gate —
  # an unrelated Xcode-26-runner-image quirk shouldn't block a PR over code nothing calls yet.
  foundation-models-compile-check:
    runs-on: macos-15
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Confirmed present on macos-15 alongside the 16.x line (see IMPLEMENTATION-LOG.md,
      # Milestone 9) — re-verify against the runner-images README if this ever starts failing to
      # find the app bundle, since exact point releases roll on a monthly-ish cadence.
      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Find an available iPhone simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | jq -r '.devices | to_entries[] | .value[] | select(.name | test("iPhone")) | .udid' \
            | head -1)
          if [ -z "$UDID" ]; then
            echo "No available iPhone simulator found:" >&2
            xcrun simctl list devices available >&2
            exit 1
          fi
          echo "Using simulator $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build with Xcode 26 (compiles FoundationModelsFallback.swift for real)
        run: |
          set -o pipefail
          xcodebuild build \
            -project AiTaskAssistant.xcodeproj \
            -scheme AiTaskAssistant \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | (command -v xcpretty >/dev/null && xcpretty || cat)
