name: iOS Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Build (simulator)
        run: |
          xcodebuild build \
            -project AiTaskAssistant.xcodeproj \
            -scheme AiTaskAssistant \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild build \
              -project AiTaskAssistant.xcodeproj \
              -scheme AiTaskAssistant \
              -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
              -configuration Debug \
              CODE_SIGNING_ALLOWED=NO

      - name: Run tests (simulator)
        run: |
          xcodebuild test \
            -project AiTaskAssistant.xcodeproj \
            -scheme AiTaskAssistantTests \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -50 || true
