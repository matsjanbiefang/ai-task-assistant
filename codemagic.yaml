workflows:
  ios-testflight:
    name: iOS → TestFlight
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic-api-key

    environment:
      xcode: latest
      groups:
        - ios
      vars:
        XCODE_PROJECT: "AiTaskAssistant.xcodeproj"
        XCODE_SCHEME: "AiTaskAssistant"
        BUNDLE_ID: "com.matsb.AiTaskAssistant"
        WIDGET_BUNDLE_ID: "com.matsb.AiTaskAssistant.Widgets"

    scripts:
      - name: Initialize keychain
        script: keychain initialize

      - name: Set up certificate private key
        script: |
          printf '%s' "$CERT_PRIVATE_KEY" > /tmp/ios_dist_key.pem

      - name: Fetch or create signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @file:/tmp/ios_dist_key.pem
          app-store-connect fetch-signing-files "$WIDGET_BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @file:/tmp/ios_dist_key.pem

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build & archive for App Store
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        # Real-device feedback (2026-07-04): explicitly internal-only distribution. Every build
        # from 12-14 uploaded and finished App Store Connect processing successfully, but then
        # failed at "Submit build to TestFlight beta review" — that step is Apple's EXTERNAL
        # tester review gate (requires Beta App Review Information: name/phone/email on the
        # account), and has nothing to do with internal testers. Internal testers with
        # "Automatic" distribution (the default) already receive every processed build with zero
        # action here — submit_to_testflight only controls submission to review-requiring
        # (external) groups, so leaving it false stops CI from erroring out at that step while
        # changing nothing about internal availability.
        #
        # Explicit beta_groups was tried for internal-only distribution but Apple's API rejects
        # assigning builds to an internal group set to "Automatic" distribution (the default) —
        # "Cannot add internal group to a build". A group would need "Manual" distribution
        # enabled in App Store Connect before it could ever be targeted explicitly this way.
        #
        # To re-enable external testing later: fill in Beta App Review Information at
        # https://appstoreconnect.apple.com/apps/6786296217/testflight/test-info, then set this
        # back to true.
        submit_to_testflight: false
        submit_to_app_store: false
