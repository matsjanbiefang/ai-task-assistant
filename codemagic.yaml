workflows:
  ios-testflight:
    name: iOS → TestFlight
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic-api-key

    environment:
      xcode: latest
      groups:
        - ios
      vars:
        XCODE_PROJECT: "AiTaskAssistant.xcodeproj"
        XCODE_SCHEME: "AiTaskAssistant"
        BUNDLE_ID: "com.matsb.AiTaskAssistant"

    scripts:
      - name: Initialize keychain
        script: keychain initialize

      - name: Set up certificate private key
        script: |
          printf '%s' "$CERT_PRIVATE_KEY" > /tmp/ios_dist_key.pem

      - name: Fetch or create signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @file:/tmp/ios_dist_key.pem

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build & archive for App Store
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Internal-only distribution (per explicit request) — without this, Codemagic also
        # attempts to submit for external beta review, which Apple rejects until Beta App Review
        # contact info (name/phone/email) is filled in on App Store Connect. "Int" is the exact
        # name of the existing internal TestFlight group for this app.
        beta_groups:
          - Int
        submit_to_app_store: false
