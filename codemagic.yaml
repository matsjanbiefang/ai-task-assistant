workflows:
  ios-testflight:
    name: iOS → TestFlight
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic-api-key

    environment:
      xcode: latest
      vars:
        XCODE_PROJECT: "AiTaskAssistant.xcodeproj"
        XCODE_SCHEME: "AiTaskAssistant"
        BUNDLE_ID: "com.matsb.AiTaskAssistant"

    scripts:
      - name: Initialize keychain
        script: keychain initialize

      - name: Generate certificate private key
        script: |
          openssl genrsa -out /tmp/ios_dist_key.pem 2048

      - name: Revoke stale distribution certificates
        script: |
          app-store-connect certificates list --type IOS_DISTRIBUTION --json 2>/dev/null \
            | python3 -c "import sys,json;d=json.load(sys.stdin);[print(c['id']) for c in (d if isinstance(d,list) else d.get('data',[]))]" 2>/dev/null \
            | while IFS= read -r id; do
                [ -n "$id" ] && app-store-connect certificates revoke "$id" || true
              done || true

      - name: Fetch or create signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key @file:/tmp/ios_dist_key.pem

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build & archive for App Store
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
